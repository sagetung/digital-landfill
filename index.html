<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>嘲諷木魚 | Cynical Clicker</title>
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="嘲諷木魚">
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: #000000;
      --fg: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;
      user-select: none;
      touch-action: manipulation;
    }

    .muyu {
      width: min(74vw, 420px);
      aspect-ratio: 1 / 1;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 80ms linear;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      z-index: 2;
    }

    .muyu:active,
    .muyu.is-pressed {
      transform: scale(0.95);
    }

    .muyu img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .counter {
      font-size: clamp(20px, 4vw, 28px);
      letter-spacing: 0.04em;
      line-height: 1;
      text-align: center;
    }

    .status-panel {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .reset-btn {
      background: transparent;
      border: 0;
      color: #555555;
      font-size: 12px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: transform 80ms linear, color 80ms linear;
      -webkit-tap-highlight-color: transparent;
    }

    .reset-btn:active,
    .reset-btn.is-pressed {
      color: #444444;
      transform: scale(0.95);
    }

    .quote-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 10;
    }

    .floating-quote {
      position: absolute;
      color: var(--fg);
      font-size: clamp(12px, 2.8vw, 18px);
      line-height: 1.35;
      white-space: nowrap;
      opacity: 0;
      animation: floatFade 3.5s ease-out forwards;
      will-change: transform, opacity;
      pointer-events: none;
    }

    .floating-quote.achievement {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(16px, 3vw, 24px);
      text-align: center;
      max-width: min(90vw, 760px);
      white-space: pre-line;
      line-height: 1.45;
      animation: achievementFade 5s ease-out forwards;
    }

    .corner-btn {
      position: absolute;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: #aaaaaa;
      font-size: 22px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: transform 80ms linear, color 80ms linear, border-color 80ms linear;
      -webkit-tap-highlight-color: transparent;
      z-index: 12;
      padding: 12px 18px;
      min-width: 48px;
      min-height: 48px;
      line-height: 1.2;
    }

    .corner-btn:active,
    .corner-btn.is-pressed {
      color: #cccccc;
      border-color: rgba(255, 255, 255, 0.55);
      transform: scale(0.95);
    }

    .add-quote-btn {
      right: 12px;
      bottom: 12px;
      font-size: 28px;
      font-weight: 300;
      padding: 10px 20px;
    }

    .atlas-btn {
      left: 12px;
      bottom: 12px;
      font-size: 20px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-card {
      width: min(92vw, 560px);
      border: 1px solid #ffffff;
      padding: 16px;
      background: #000000;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-card.atlas-card {
      width: min(94vw, 600px);
      max-height: min(92vh, 720px);
    }

    .modal-card.atlas-card .modal-actions {
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .modal-input {
      width: 100%;
      border: 1px solid #ffffff;
      background: #000000;
      color: #ffffff;
      outline: none;
      padding: 8px;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-btn {
      background: transparent;
      border: 1px solid #555555;
      color: #888888;
      font-size: 12px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .modal-btn:active {
      transform: scale(0.98);
      color: #666666;
      border-color: #444444;
    }

    .atlas-total {
      font-size: 13px;
      color: #aaaaaa;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .atlas-total strong {
      color: #ffffff;
      font-weight: 600;
    }

    .atlas-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding-right: 6px;
      margin-top: 4px;
    }

    .atlas-section {
      border: 1px solid #333333;
      padding: 14px 12px;
      background: #000000;
    }

    .atlas-section-title {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #ffffff;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .achievement-row {
      padding: 10px 0;
      border-top: 1px solid #222222;
      font-size: 13px;
      line-height: 1.55;
    }

    .achievement-row:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .achievement-row.locked {
      color: #555555;
      opacity: 0.4;
    }

    .achievement-row.unlocked {
      color: #ffffff;
      opacity: 1;
    }

    .achievement-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .achievement-lock {
      font-size: 11px;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .achievement-name {
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .achievement-desc {
      font-size: 12px;
      line-height: 1.5;
      margin-top: 2px;
    }

    .achievement-row.locked .achievement-desc {
      display: none;
    }

    .achievement-condition {
      font-size: 12px;
      margin-top: 2px;
    }

    .custom-quote-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px solid #222222;
      font-size: 13px;
      line-height: 1.5;
      color: #cccccc;
    }

    .custom-quote-row:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .custom-quote-text {
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }

    .delete-quote-btn {
      flex-shrink: 0;
      background: transparent;
      border: 0;
      color: #884444;
      font-size: 18px;
      line-height: 1;
      padding: 2px 8px;
      cursor: pointer;
      transition: color 80ms linear, transform 80ms linear;
      -webkit-tap-highlight-color: transparent;
    }

    .delete-quote-btn:hover {
      color: #aa5555;
    }

    .delete-quote-btn:active {
      transform: scale(0.92);
      color: #cc6666;
    }

    .delete-quote-btn .del-txt {
      font-size: 10px;
      letter-spacing: 0.06em;
      margin-left: 2px;
      vertical-align: middle;
    }

    .atlas-empty {
      font-size: 13px;
      color: #555555;
      opacity: 0.65;
      line-height: 1.5;
    }

    .atlas-runtime-stats {
      font-size: 11px;
      line-height: 1.55;
      color: #777777;
      letter-spacing: 0.03em;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .atlas-runtime-stats span {
      display: block;
    }

    @keyframes achievementFade {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(10px);
      }
      12% {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0);
      }
      78% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(-10px);
      }
    }

    @keyframes floatFade {
      0% {
        transform: translateY(0);
        opacity: 0;
      }
      14% {
        opacity: 1;
      }
      72% {
        opacity: 1;
      }
      100% {
        transform: translateY(-66px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <button id="muyuButton" class="muyu" aria-label="敲擊木魚">
      <img src="muyu.png" alt="木魚圖示">

    <button id="atlasButton" class="corner-btn atlas-btn" type="button" aria-label="開啟虛無圖鑑">圖鑑</button>
    <button id="addQuoteButton" class="corner-btn add-quote-btn" type="button" aria-label="新增自定義語錄">+</button>

    </div>
  </div>

  <div id="atlasModal" class="modal-overlay" aria-hidden="true">

      <div class="modal-actions">
        <button id="closeAtlasButton" class="modal-btn" type="button">關閉</button>
      </div>
    </div>
  </div>

    const addQuoteModal = document.getElementById("addQuoteModal");
    const atlasModal = document.getElementById("atlasModal");
    const customQuoteInput = document.getElementById("customQuoteInput");
    const confirmAddQuoteButton = document.getElementById("confirmAddQuoteButton");
    const cancelAddQuoteButton = document.getElementById("cancelAddQuoteButton");
    const closeAtlasButton = document.getElementById("closeAtlasButton");
    const atlasTotalClicksEl = document.getElementById("atlasTotalClicks");
    const atlasRuntimeStatsEl = document.getElementById("atlasRuntimeStats");
    const atlasAchievementsEl = document.getElementById("atlasAchievements");
    const atlasCustomQuotesEl = document.getElementById("atlasCustomQuotes");
    const baseMuyuSound = new Audio("muyu.mp3");
    baseMuyuSound.preload = "auto";

    let count = 0;
    let totalClicks = loadNumber(STORAGE_KEYS.totalClicks, 0);
    let customQuotes = loadStringArray(STORAGE_KEYS.customQuotes);
    let unlockedAchievements = migrateUnlockedIds(
      loadStringArray(STORAGE_KEYS.unlockedAchievements)
    );
    achievementDefinitions.forEach((ach) => {
      if (ach.kind !== "total") return;
      if (totalClicks >= ach.need && !unlockedAchievements.includes(ach.id)) {
        unlockedAchievements.push(ach.id);
      }
    });
    unlockedAchievements = [...new Set(unlockedAchievements)];
    saveStringArray(STORAGE_KEYS.unlockedAchievements, unlockedAchievements);
    let allQuotes = defaultQuotes.concat(customQuotes);

    const pageLoadAt = Date.now();
    let sessionMuyuClicks = 0;
    let lastMuyuClickAt = 0;
    const muyuClickTimestamps = [];
    let schrodingerIdlePending = false;
    let peakCps1s = 0;

    function loadNumber(key, fallback) {
      const raw = localStorage.getItem(key);
      if (raw === null) return fallback;
      const parsed = Number(raw);
      return Number.isFinite(parsed) ? parsed : fallback;
    }

    function loadStringArray(key) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.filter((item) => typeof item === "string" && item.trim().length > 0);
      } catch (_) {
        return [];
      }
    }

    function saveNumber(key, value) {
      localStorage.setItem(key, String(value));
    }

    function saveStringArray(key, array) {
      localStorage.setItem(key, JSON.stringify(array));
    }

    function refreshQuotePool() {
      allQuotes = defaultQuotes.concat(customQuotes);
    }

    function migrateUnlockedIds(list) {
      const next = list.map((id) => ACHIEVEMENT_LEGACY_MAP[id] || id);
      return [...new Set(next)];
    }

    function pruneMuyuTimestamps(now) {
      const cutoff = now - 120000;
      while (muyuClickTimestamps.length && muyuClickTimestamps[0] < cutoff) {
        muyuClickTimestamps.shift();
      }
    }

    function countMuyuInWindow(now, windowMs) {
      const start = now - windowMs;
      let n = 0;
      for (let i = muyuClickTimestamps.length - 1; i >= 0; i--) {
        if (muyuClickTimestamps[i] >= start) n++;
        else break;
      }
      return n;
    }

    function updatePeakCps(now) {
      const cps = countMuyuInWindow(now, 1000);
      if (cps > peakCps1s) peakCps1s = cps;
    }

    function recordMuyuClickForStats(now) {
      pruneMuyuTimestamps(now);
      if (schrodingerIdlePending) {
        schrodingerIdlePending = false;
      }
      muyuClickTimestamps.push(now);
      lastMuyuClickAt = now;
      sessionMuyuClicks += 1;
      updatePeakCps(now);
      const burstCount = countMuyuInWindow(now, 60000);
      const def = achievementDefinitions.find((a) => a.id === "ach_schrodinger_insight");
      if (def && burstCount > 100 && !achievementUnlocked(def.id)) {
        schrodingerIdlePending = true;
      }
    }

    function isMidnightPhilosopherHour() {
      const h = new Date().getHours();
      return h >= 2 && h < 5;
    }

    function achievementUnlocked(id) {
      return unlockedAchievements.includes(id);
    }

    function unlockAchievement(ach) {
      if (!ach || achievementUnlocked(ach.id)) return false;
      unlockedAchievements.push(ach.id);
      saveStringArray(STORAGE_KEYS.unlockedAchievements, unlockedAchievements);
      spawnQuote(ach.title + "\n" + ach.unlockMessage, "center", "achievement");
      return true;
    }

    function checkClickTriggeredAchievements() {
      const order = [
        "ach_overclock_hands",
        "ach_midnight_philosopher",
        "ach_novice_salaryman",
        "ach_schrodinger_meaning",
        "ach_infinite_game_prisoner"
      ];
      for (let i = 0; i < order.length; i++) {
        const id = order[i];
        if (achievementUnlocked(id)) continue;
        const ach = achievementDefinitions.find((a) => a.id === id);
        if (!ach) continue;
        if (ach.kind === "burst10s") {
          const now = Date.now();
          if (countMuyuInWindow(now, ach.windowMs) > ach.need) {
            return unlockAchievement(ach);
          }
        } else if (ach.kind === "midnight") {
          if (isMidnightPhilosopherHour()) {
            return unlockAchievement(ach);
          }
        } else if (ach.kind === "total") {
          if (totalClicks >= ach.need) {
            return unlockAchievement(ach);
          }
        }
      }
      return false;
    }

    function trySchrodingerIdleUnlock() {
      const ach = achievementDefinitions.find((a) => a.id === "ach_schrodinger_insight");
      if (!ach || achievementUnlocked(ach.id) || !schrodingerIdlePending || !lastMuyuClickAt) {
        return false;
      }
      const now = Date.now();
      if (now - lastMuyuClickAt >= ach.idleMs) {
        schrodingerIdlePending = false;
        return unlockAchievement(ach);
      }
      return false;
    }

    function tryAmuseDeadUnlock() {
      const ach = achievementDefinitions.find((a) => a.id === "ach_amuse_dead_numb");
      if (!ach || achievementUnlocked(ach.id)) return false;
      if (sessionMuyuClicks === 0 && Date.now() - pageLoadAt >= ach.idleMs) {
        return unlockAchievement(ach);
      }
      return false;
    }

    function renderAtlasRuntimeStats() {
      if (!atlasRuntimeStatsEl) return;
      const now = Date.now();
      const cps = lastMuyuClickAt ? countMuyuInWindow(now, 1000) : 0;
      const idleSec = lastMuyuClickAt
        ? Math.floor((now - lastMuyuClickAt) / 1000)
        : Math.floor((now - pageLoadAt) / 1000);
      const openMin = ((now - pageLoadAt) / 60000).toFixed(1);
      atlasRuntimeStatsEl.innerHTML =
        "<span>追蹤：近 1 秒木魚 CPS（約） " +
        cps +
        "／歷史峰值 " +
        peakCps1s +
        "</span>" +
        "<span>距離上次木魚點擊： " +
        idleSec +
        " 秒（本頁累計木魚 " +
        sessionMuyuClicks +
        " 次）</span>" +
        "<span>頁面已開啟： " +
        openMin +
        " 分 · 本地時間 " +
        new Date().toLocaleString() +
        "</span>";
    }

    setInterval(() => {
      trySchrodingerIdleUnlock();
      tryAmuseDeadUnlock();
    }, 400);

    setTimeout(() => {
      tryAmuseDeadUnlock();
    }, 600000);

    function randomFrom(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getMuyuCenter() {
      const rect = muyuButton.getBoundingClientRect();
      return {
        rect: rect,
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
        size: Math.max(rect.width, rect.height)
      };
    }

    function playMuyuSound() {
      const sound = baseMuyuSound.cloneNode();
      sound.currentTime = 0;
      sound.play().catch(() => {
        // Ignore autoplay/playback rejections quietly.
      });
    }

    function randomRingPoint(quoteWidth, quoteHeight) {
      const center = getMuyuCenter();
      const footerRect = statusPanel.getBoundingClientRect();
      const angle = Math.random() * Math.PI * 2;
      const minRadius = center.size / 2 + 20;

      const quoteHalfW = quoteWidth / 2;
      const quoteHalfH = quoteHeight / 2;

      const maxToLeft = center.x - (8 + quoteHalfW);
      const maxToRight = (window.innerWidth - 8 - quoteHalfW) - center.x;
      const maxToTop = center.y - (8 + quoteHalfH);
      const maxToBottom = (Math.max(8, footerRect.top - 12) - quoteHalfH) - center.y;
      const maxBaseRadius = Math.max(0, Math.min(maxToLeft, maxToRight, maxToTop, maxToBottom));
      const maxRadius = Math.max(minRadius + 2, maxBaseRadius);

      const radius = minRadius + Math.random() * Math.max(2, maxRadius - minRadius);
      const x = center.x + Math.cos(angle) * radius;
      const y = center.y + Math.sin(angle) * radius;
      return { x, y };
    }

    function spawnQuote(text, placement, variant) {
      const quote = document.createElement("span");
      quote.className = "floating-quote";
      if (variant === "achievement") {
        quote.classList.add("achievement");
      }
      quote.textContent = text || randomFrom(allQuotes);

      quoteLayer.appendChild(quote);
      const quoteRect = quote.getBoundingClientRect();
      let x = 0;
      let y = 0;

      if (variant === "achievement") {
        quote.addEventListener("animationend", () => {
          quote.remove();
        }, { once: true });
        return;
      }

      if (placement === "top") {
        const topMin = 16;
        const topMax = Math.max(topMin, Math.min(window.innerHeight * 0.26, getMuyuCenter().rect.top - 24));
        x = 8 + Math.random() * Math.max(1, window.innerWidth - quoteRect.width - 16);
        y = topMin + Math.random() * Math.max(1, topMax - topMin);
      } else {
        const ringPoint = randomRingPoint(quoteRect.width, quoteRect.height);
        const xJitter = (Math.random() - 0.5) * 22;
        const yJitter = (Math.random() - 0.5) * 14;
        x = ringPoint.x - quoteRect.width / 2 + xJitter;
        y = ringPoint.y - quoteRect.height / 2 + yJitter;
      }

      const yLimit = Math.max(8, statusPanel.getBoundingClientRect().top - quoteRect.height - 12);
      x = clamp(x, 8, window.innerWidth - quoteRect.width - 8);
      y = clamp(y, 8, yLimit);

      quote.style.left = x + "px";
      quote.style.top = y + "px";

      quote.addEventListener("animationend", () => {
        quote.remove();
      }, { once: true });
    }

    function openModal(modalEl) {
      modalEl.classList.add("open");
      modalEl.setAttribute("aria-hidden", "false");
    }

    function closeModal(modalEl) {
      modalEl.classList.remove("open");
      modalEl.setAttribute("aria-hidden", "true");
    }

    function renderAtlasAchievements() {
      atlasAchievementsEl.innerHTML = achievementDefinitions
        .map((ach) => {
          const unlocked = achievementUnlocked(ach.id);
          const rowClass = unlocked ? "achievement-row unlocked" : "achievement-row locked";
          const lockLabel = unlocked
            ? ""
            : '<span class="achievement-lock" aria-hidden="true">鎖</span>';
          const nameHtml = '<span class="achievement-name">' + ach.title + "</span>";
          const conditionHtml =
            '<p class="achievement-condition">' + ach.conditionLabel + "</p>";
          const descHtml =
            '<p class="achievement-desc">' + ach.unlockMessage + "</p>";
          return (
            '<div class="' +
            rowClass +
            '" data-achievement-id="' +
            ach.id +
            '">' +
            '<div class="achievement-head">' +
            lockLabel +
            nameHtml +
            "</div>" +
            (unlocked ? descHtml : conditionHtml) +
            "</div>"
          );
        })
        .join("");
    }

    function renderAtlasCustomQuotes() {
      if (customQuotes.length === 0) {
        atlasCustomQuotesEl.innerHTML =
          '<p class="atlas-empty">空空如也，一如你的人生</p>';
        return;
      }
      atlasCustomQuotesEl.innerHTML = customQuotes
        .map((quote, index) => {
          const safe = quote
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
          return (
            '<div class="custom-quote-row">' +
            '<span class="custom-quote-text">' +
            safe +
            "</span>" +
            '<button type="button" class="delete-quote-btn" data-quote-index="' +
            index +
            '" aria-label="刪除此句語錄"><span class="del-x" aria-hidden="true">×</span><span class="del-txt">刪除</span></button>' +
            "</div>"
          );
        })
        .join("");
    }

    function renderAtlas() {
      atlasTotalClicksEl.textContent = String(totalClicks);
      renderAtlasRuntimeStats();
      renderAtlasAchievements();
      renderAtlasCustomQuotes();
    }

    function deleteCustomQuoteAt(index) {
      if (index < 0 || index >= customQuotes.length) return;
      customQuotes.splice(index, 1);
      saveStringArray(STORAGE_KEYS.customQuotes, customQuotes);
      refreshQuotePool();
      renderAtlas();
    }

    function addCustomQuoteFromInput() {
      const value = customQuoteInput.value.trim();
      if (!value) return;
      customQuotes.push(value);
      saveStringArray(STORAGE_KEYS.customQuotes, customQuotes);
      refreshQuotePool();
      closeModal(addQuoteModal);
      customQuoteInput.value = "";
      spawnQuote("新的彈藥已入庫。", "top");
    }

    function clickMuyu() {
      count += 1;
      totalClicks += 1;
      counterEl.textContent = "點擊次數：" + count;
      saveNumber(STORAGE_KEYS.totalClicks, totalClicks);
      recordMuyuClickForStats(Date.now());
      playMuyuSound();

      if (checkClickTriggeredAchievements()) return;
      spawnQuote(randomFrom(allQuotes));
    }

    muyuButton.addEventListener("click", clickMuyu);
    resetButton.addEventListener("click", () => {
      count = 0;
      counterEl.textContent = "點擊次數：0";
      spawnQuote("你以為一切都可以重新開始？", "top");
    });
    addQuoteButton.addEventListener("click", () => {
      openModal(addQuoteModal);
      setTimeout(() => customQuoteInput.focus(), 0);
    });
    confirmAddQuoteButton.addEventListener("click", addCustomQuoteFromInput);
    cancelAddQuoteButton.addEventListener("click", () => closeModal(addQuoteModal));
    atlasButton.addEventListener("click", () => {
      renderAtlas();
      openModal(atlasModal);
    });
    closeAtlasButton.addEventListener("click", () => closeModal(atlasModal));
    addQuoteModal.addEventListener("click", (event) => {
      if (event.target === addQuoteModal) closeModal(addQuoteModal);
    });
    atlasModal.addEventListener("click", (event) => {
      if (event.target === atlasModal) closeModal(atlasModal);
    });
    atlasCustomQuotesEl.addEventListener("click", (event) => {
      const btn = event.target.closest(".delete-quote-btn");
      if (!btn || !atlasCustomQuotesEl.contains(btn)) return;
      const idx = Number(btn.getAttribute("data-quote-index"));
      if (!Number.isFinite(idx)) return;
      deleteCustomQuoteAt(idx);
    });
    customQuoteInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addCustomQuoteFromInput();
      }
    });

    // Keyboard support
    muyuButton.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        muyuButton.classList.add("is-pressed");
      }
    });

    muyuButton.addEventListener("keyup", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        muyuButton.classList.remove("is-pressed");
        clickMuyu();
      }
    });

    resetButton.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        resetButton.classList.add("is-pressed");
      }
    });

    resetButton.addEventListener("keyup", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        resetButton.classList.remove("is-pressed");
        resetButton.click();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeModal(addQuoteModal);
        closeModal(atlasModal);
      }
    });
  </script>
</body>
</html>
